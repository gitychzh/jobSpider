<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>招聘信息聚合 - jobSpider</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="header">
    <h1>招聘信息聚合</h1>
    <div class="subtitle">多平台招聘数据一览</div>
    <div class="stats-row">
        <div class="stat-card">职位 <span class="num" id="totalJobs">-</span> 条</div>
        <div class="stat-card">公司 <span class="num" id="totalCompanies">-</span> 家</div>
        <div class="stat-card" id="cityStats"></div>
    </div>
    <div class="last-update">更新时间 (北京时间): <span id="lastUpdate">-</span></div>
</div>

<div class="tabs">
    <button class="tab-btn active" data-source="job51" onclick="switchSource('job51')">
        51job <span class="tab-badge">5城</span>
    </button>
    <button class="tab-btn" data-source="zhilian" onclick="switchSource('zhilian')">
        智联招聘 <span class="tab-badge">未开放</span>
    </button>
    <button class="tab-btn" data-source="boss" onclick="switchSource('boss')">
        Boss直聘 <span class="tab-badge">未开放</span>
    </button>
</div>

<div class="controls">
    <label>城市</label>
    <select id="cityFilter" onchange="loadJobs(1)">
        <option value="">全部城市</option>
    </select>
    <label>排序</label>
    <select id="sortField" onchange="loadJobs(1)">
        <option value="issue_date">发布时间</option>
        <option value="confirm_date">确认时间</option>
        <option value="update_time">更新时间</option>
    </select>
    <select id="sortOrder" onchange="loadJobs(1)">
        <option value="desc">从新到旧</option>
        <option value="asc">从旧到新</option>
    </select>
    <input type="text" id="searchBox" placeholder="搜索职位/公司..." style="flex:1;min-width:150px;">
    <button class="btn btn-light" onclick="filterJobs()">搜索</button>
</div>

<div class="jobs-list" id="jobsList">
    <div class="loading-box"><span class="spinner"></span><br>加载中...</div>
</div>

<div class="pagination" id="pagination"></div>

<script src="js/render.js"></script>
<script src="js/app.js"></script>
</body>
</html>
