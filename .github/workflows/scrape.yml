name: Scrape & Push to D1

on:
  schedule:
    # 北京时间 8:00-20:00 每隔2小时 (UTC+0:00,2:00,4:00,6:00,8:00,10:00,12:00)
    - cron: '0 0,2,4,6,8,10,12 * * *'
  workflow_dispatch:
    inputs:
      pages_per_city:
        description: '每城市爬取页数'
        required: false
        default: '5'

permissions:
  contents: read

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run scrapers and push to D1
        run: |
          python -m scrapers.runner --source job51 --pages ${Pages} --push-d1
        env:
          Pages: ${{ github.event.inputs.pages_per_city || '5' }}
          CF_API_URL: ${{ vars.CF_API_URL }}
          CF_IMPORT_SECRET: ${{ secrets.CF_IMPORT_SECRET }}