name: Scrape & Deploy

on:
  schedule:
    # 北京时间 10:00 = UTC 02:00
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      pages_per_city:
        description: '每城市爬��页数'
        required: false
        default: '5'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run scrapers
        run: |
          python -m scrapers.runner --source job51 --pages ${Pages}
        env:
          Pages: ${{ github.event.inputs.pages_per_city || '5' }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: scrape
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4